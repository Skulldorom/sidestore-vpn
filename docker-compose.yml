services:
  tailscale:
    image: tailscale/tailscale:stable
    container_name: sidestore-tailscale
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_ROUTES=${TS_ROUTES:-10.7.0.1/32}
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:---snat-subnet-routes=false}
      - TS_HOSTNAME=${TS_HOSTNAME:-sidestore-vpn}
      - TS_STATE_DIR=/var/lib/tailscale
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ./state:/var/lib/tailscale

  sidestore-vpn:
    image: ghcr.io/skulldorom/sidestore-vpn:latest
    container_name: sidestore-vpn
    network_mode: "service:tailscale"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped
    depends_on:
      tailscale:
        condition: service_healthy
