name: Build and Publish Docker Image

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-image:
    name: Build ${{ matrix.arch }} image
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64/v8
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image-name
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: arch-meta
        with:
          images: ${{ steps.image-name.outputs.image }}
          tags: |
            type=raw,value=sha-${{ github.sha }}-${{ matrix.arch }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.arch-meta.outputs.tags }}
          labels: ${{ steps.arch-meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  publish-manifest:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set lowercase image name
        id: image-name
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image-name.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Create and push manifest tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          AMD64_IMAGE: ${{ steps.image-name.outputs.image }}:sha-${{ github.sha }}-amd64
          ARM64_IMAGE: ${{ steps.image-name.outputs.image }}:sha-${{ github.sha }}-arm64
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create \
              --tag "$tag" \
              "$AMD64_IMAGE" \
              "$ARM64_IMAGE"
          done <<EOF
          $TAGS
          EOF
